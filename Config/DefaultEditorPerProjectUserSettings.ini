; Project-level defaults for per-user editor settings.
;
; Unreal stores per-user Editor Preferences in
;   Saved/Config/WindowsEditor/EditorPerProjectUserSettings.ini
; which is git-ignored and is only flushed on a clean editor shutdown
; (so an editor crash loses them). Values placed here are loaded as the
; project default every session, so the MCP server and Terminal startup
; survive crashes, a wiped Saved/ folder, and fresh checkouts.

[/Script/ModelContextProtocolEngine.ModelContextProtocolSettings]
ServerPortNumber=8000
bAutoStartServer=True

[/Script/Terminal.TerminalSettings]
+StartupCommands=set TERM=xterm-256color
+StartupCommands=cd /d "C:\Users\rhyol\Documents\Unreal\mcp_tester"
+StartupCommands=C:\Users\rhyol\.local\bin\claude.exe --dangerously-skip-permissions --resume
